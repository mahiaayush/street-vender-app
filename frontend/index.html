<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    
    <!-- Premium SEO Metadata -->
    <title>🚚 Theliya Vale | Real-Time Street Vendor & Doorstep Services Tracker</title>
    <meta name="description" content="Locate, track, and order from your favorite local street food carts, organic sabzi walas, doorstep dry cleaners, washer-dryers, and repair services live on an interactive map." />
    <meta name="keywords" content="street vendor tracker, live location tracking, dry cleaners near me, local dry cleaning, washer dryer, snack carts, delhi golgappa, momos live, door step laundry, local services" />
    <meta name="author" content="Theliya Vale" />
    
    <!-- Open Graph (OG) Metadata (Gorgeous WhatsApp, iMessage, and Slack Social Cards) -->
    <meta property="og:title" content="Theliya Vale | Real-Time Street Vendor & Services Tracker" />
    <meta property="og:description" content="Discover, share, and track local food carts, doorstep laundry, and home repair services live in real-time. View today's rate cards and place orders instantly!" />

    <meta property="og:site_name" content="Theliya Vale Tracker" />
    
    <!-- Twitter Card Previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="🚚 Theliya Vale | Live Street Vendor & Services Tracker" />
    <meta name="twitter:description" content="Find and track organic vegetable sellers, washer-dryer laundry carts, momos, and golgappa stands live on our real-time interactive map." />

    <!-- Modern Typography Integration (Google Fonts Inter & Outfit) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet" />

    <!-- Premium Style Reset & Global Overrides -->
    <style id="expo-reset">
      /* Premium body and container canvas settings */
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #121214;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #eaeaea;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Disable default body scrolling to favor responsive ScrollView panels */
      body {
        overflow: hidden;
      }
      
      /* Full viewport root flex container mapping */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      
      /* Apply premium typography headers style */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif !important;
      }
    </style>
  </head>

  <body>
    <noscript>
      <div style="padding: 20px; text-align: center; background-color: #ff453a; color: white; font-weight: bold;">
        You need to enable JavaScript to run this premium real-time tracker application.
      </div>
    </noscript>
    
    <!-- The root mounting viewport for our Expo React Native Web App -->
    <div id="root"></div>
  </body>
</html>
